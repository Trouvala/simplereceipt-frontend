const API_BASE = "https://simplereceipt-api.diegovegafius.workers.dev";
<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Receipts</title>
  <style>
    body { font-family: system-ui, Arial; margin: 12px; }
    .card { border: 1px solid #ddd; border-radius: 12px; padding: 12px; margin-bottom: 12px; }
    button { padding: 10px 14px; border-radius: 10px; border: 1px solid #333; background: #111; color:#fff; }
    input, select { padding: 10px; border-radius: 10px; border: 1px solid #ccc; width: 100%; }
    table { width: 100%; border-collapse: collapse; font-size: 14px; }
    th, td { border-bottom: 1px solid #eee; padding: 8px; text-align: left; }
    .row { display: grid; gap: 10px; }
    .muted { color: #666; font-size: 13px; }
    .ok { color: #0a7; font-weight: 600; }
    .err { color: #c00; font-weight: 600; white-space: pre-wrap; }
  </style>
</head>
<body>

  <h2>📸 Receipts</h2>

  <div class="card row">
    <label class="muted">Categoría (manual)</label>
    <select id="category">
      <option value="cafe">cafe</option>
      <option value="groceries">groceries</option>
      <option value="transport">transport</option>
      <option value="other">other</option>
    </select>

    <label class="muted">Foto boleta</label>
    <!-- capture=environment abre cámara atrás en muchos celulares -->
    <input id="file" type="file" accept="image/*" capture="environment" />

    <button id="btnUpload">Subir y procesar</button>

    <div id="status" class="muted">Listo pa subir.</div>
  </div>

  <div class="card">
    <div style="display:flex; justify-content:space-between; align-items:center; gap:10px;">
      <div>
        <div class="muted">Tabla (desde receipts.csv)</div>
        <div id="count" class="muted"></div>
      </div>
      <button id="btnExport">Exportar XLSX</button>
    </div>

    <div style="overflow:auto; margin-top:10px;">
      <table id="tbl">
        <thead>
          <tr>
            <th>Date</th><th>Vendor</th><th>Total</th><th>Tax</th><th>Currency</th><th>Category</th><th>Source</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
    </div>
  </div>

<script>
const $ = (id) => document.getElementById(id);

async function loadCSV() {
 const res = await fetch(`${API_BASE}/receipts.csv?ts=` + Date.now());
  if (!res.ok) return;

  const text = await res.text();
  const lines = text.trim().split(/\r?\n/);
  if (lines.length <= 1) {
    $('count').textContent = '0 receipts';
    $('tbl').querySelector('tbody').innerHTML = '';
    return;
  }

  const rows = lines.slice(1).map(l => l.split(','));
  $('count').textContent = `${rows.length} receipts`;

  const tbody = $('tbl').querySelector('tbody');
  tbody.innerHTML = '';

  // muestra las últimas 30 (para que no se ponga lento)
  rows.slice(-30).reverse().forEach(cols => {
    const tr = document.createElement('tr');
    // Esperado: date,vendor,total,tax,currency,category,source,(opcional hash)
    const safe = (x) => (x ?? '').toString();
    const date = safe(cols[0]);
    const vendor = safe(cols[1]);
    const total = safe(cols[2]);
    const tax = safe(cols[3]);
    const currency = safe(cols[4]);
    const category = safe(cols[5]);
    const source = safe(cols[6]);

    tr.innerHTML = `
      <td>${date}</td>
      <td>${vendor}</td>
      <td>${total}</td>
      <td>${tax}</td>
      <td>${currency}</td>
      <td>${category}</td>
      <td>${source}</td>
    `;
    tbody.appendChild(tr);
  });
}

$('btnUpload').addEventListener('click', async () => {
  const f = $('file').files[0];
  if (!f) {
    $('status').textContent = '⚠️ Sube o saca una foto primero.';
    return;
  }

  $('status').textContent = '⏳ Procesando... (subiendo + OCR + GPT)';
  $('status').className = 'muted';

  const fd = new FormData();
  fd.append('image', f);
  fd.append('category', $('category').value);

  try {
    const res = await fetch(`${API_BASE}/upload`, { method: 'POST', body: fd });
    const data = await res.json().catch(() => ({}));

    if (!res.ok || !data.ok) {
      $('status').className = 'err';
      $('status').textContent = '❌ Error:\n' + (data.error || JSON.stringify(data) || 'upload failed');
      return;
    }

    $('status').className = 'ok';
    $('status').textContent = `✅ OK. receiptId=${data.receiptId || '(sin id)'}`;
    await loadCSV();
  } catch (e) {
    $('status').className = 'err';
    $('status').textContent = '❌ Error:\n' + e.message;
  }
});

$('btnExport').addEventListener('click', () => {
  // descarga directa del backend
  window.location.href = `${API_BASE}/export`;
});

// carga inicial
loadCSV();
</script>

</body>
</html>
